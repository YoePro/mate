<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MATE</title>

	<link rel="stylesheet" href="/static/css/reset.css">
	<link rel="stylesheet" href="/static/css/main.css">
	<link rel="stylesheet" href="/static/css/layout.css">
	<link rel="stylesheet" href="/static/css/components.css">
	<link rel="stylesheet" href="/static/css/graph.css">
	<link rel="stylesheet" href="/static/css/toolbox.css">
</head>
<body>
	<div class="app-shell" data-app-root>
		<header class="app-header">
			<h1>MATE</h1>
			<p>Memories, Alliances, Time, Engagement</p>
		</header>

		<main class="app-main" aria-label="MATE workspace">
			<aside class="toolbox-panel" aria-label="Future node toolbox">
				<h2>Toolbox</h2>
				<p>People, groups, places, and tags.</p>
			</aside>

			<section class="workspace" aria-label="Future relationship graph workspace">
				<div class="workspace-empty">
					<h2>Relationship map</h2>
					<p>Shared history and connections.</p>
				</div>
			</section>
		</main>
	</div>

	<script src="/static/js/dom.js"></script>
	<script src="/static/js/api.js"></script>
	<script src="/static/js/router.js"></script>
	<script src="/static/js/canvas.js"></script>
	<script src="/static/js/graph.js"></script>
	<script src="/static/js/nodes.js"></script>
	<script src="/static/js/links.js"></script>
	<script src="/static/js/toolbox.js"></script>
	<script src="/static/js/app.js"></script>
</body>
</html>
