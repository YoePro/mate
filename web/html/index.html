<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MATE — Memories Alliances Time Engagement</title>
  <link rel="stylesheet" href="/static/css/reset.css" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/graph.css" />
  <link rel="stylesheet" href="/static/css/toolbox.css" />
</head>
<body>

<!-- Config is served by the Go backend at /static/js/config.js -->
<script src="/static/js/config.js"></script>

<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="header-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <circle cx="4" cy="6" r="2"/>
        <circle cx="20" cy="6" r="2"/>
        <circle cx="4" cy="18" r="2"/>
        <circle cx="20" cy="18" r="2"/>
        <line x1="6" y1="7" x2="10" y2="11"/>
        <line x1="18" y1="7" x2="14" y2="11"/>
        <line x1="6" y1="17" x2="10" y2="13"/>
        <line x1="18" y1="17" x2="14" y2="13"/>
      </svg>
      <span class="brand-name">MATE</span>
      <span class="brand-tagline">Memories · Alliances · Time · Engagement</span>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search people, places, tags..." autocomplete="off" />
      </div>
    </div>
    <div class="header-actions">
      <button id="btn-fit" class="btn-icon" title="Fit graph to view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
      <button id="btn-reload" class="btn-icon" title="Reload graph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <div id="status-indicator" class="status-dot status-ok" title="Connected"></div>
    </div>
  </header>

  <!-- Main area -->
  <div id="main">

    <!-- Left toolbox -->
    <aside id="toolbox">
      <div class="toolbox-section">
        <h3 class="toolbox-heading">People</h3>
        <button class="tool-item" data-entity="person" draggable="true">
          <span class="tool-dot dot-person"></span>
          <span class="tool-label">Person</span>
        </button>
      </div>
      <div class="toolbox-section">
        <h3 class="toolbox-heading">Organizations</h3>
        <button class="tool-item" data-entity="company" draggable="true">
          <span class="tool-dot dot-company"></span>
          <span class="tool-label">Company</span>
        </button>
        <button class="tool-item" data-entity="association" draggable="true">
          <span class="tool-dot dot-association"></span>
          <span class="tool-label">Association</span>
        </button>
        <button class="tool-item" data-entity="school" draggable="true">
          <span class="tool-dot dot-school"></span>
          <span class="tool-label">School</span>
        </button>
      </div>
      <div class="toolbox-section">
        <h3 class="toolbox-heading">Context</h3>
        <button class="tool-item" data-entity="location" draggable="true">
          <span class="tool-dot dot-location"></span>
          <span class="tool-label">Location</span>
        </button>
        <button class="tool-item" data-entity="tag" draggable="true">
          <span class="tool-dot dot-tag"></span>
          <span class="tool-label">Tag</span>
        </button>
      </div>
      <div class="toolbox-hint">
        <p>Click to add a node.<br>Drag onto workspace.</p>
        <p class="hint-keys"><kbd>Shift</kbd>+click to link<br><kbd>Del</kbd> to remove</p>
      </div>
    </aside>

    <!-- Graph workspace -->
    <div id="workspace">
      <div id="workspace-inner">
        <svg id="links-layer" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
            </marker>
          </defs>
        </svg>
        <div id="nodes-layer"></div>
      </div>
      <div id="workspace-empty" class="workspace-empty">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="16" cy="32" r="8"/>
          <circle cx="48" cy="16" r="8"/>
          <circle cx="48" cy="48" r="8"/>
          <line x1="24" y1="29" x2="40" y2="19"/>
          <line x1="24" y1="35" x2="40" y2="45"/>
        </svg>
        <p>Your network is empty</p>
        <span>Click a node type on the left, or drag it onto the canvas</span>
      </div>
    </div>

    <!-- Right inspector -->
    <aside id="inspector" class="inspector-hidden">
      <div class="inspector-header">
        <h2 id="inspector-title">Details</h2>
        <button id="inspector-close" class="btn-icon" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="inspector-body"></div>
    </aside>

  </div>

</div>

<!-- Node creation / edit modal -->
<div id="modal-overlay" class="modal-hidden">
  <div id="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Node</h2>
      <button id="modal-close" class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="modal-form" class="modal-body"></form>
    <div class="modal-footer">
      <button id="modal-delete" class="btn btn-danger" style="display:none">Delete</button>
      <div class="modal-footer-right">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Link creation modal -->
<div id="link-modal-overlay" class="modal-hidden">
  <div id="link-modal">
    <div class="modal-header">
      <h2>Create Relationship</h2>
      <button id="link-modal-close" class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="link-nodes-preview" class="link-preview"></div>
      <div class="form-group">
        <label class="form-label" for="link-type-select">Relationship type</label>
        <select id="link-type-select" class="form-select">
          <option value="knows">Knows</option>
          <option value="spouse_of">Spouse of</option>
          <option value="parent_of">Parent of</option>
          <option value="sibling_of">Sibling of</option>
          <option value="works_at">Works at</option>
          <option value="member_of">Member of</option>
          <option value="studied_at">Studied at</option>
          <option value="lives_in">Lives in</option>
          <option value="has_tag">Has tag</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="link-notes">Notes</label>
        <textarea id="link-notes" class="form-input" rows="2" placeholder="Optional notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-right">
        <button id="link-modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="link-modal-save" class="btn btn-primary">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- Person attribute modal -->
<div id="attribute-modal-overlay" class="modal-hidden">
  <div id="attribute-modal">
    <div class="modal-header">
      <h2>Add Attribute</h2>
      <button id="attribute-modal-close" class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="attribute-form" class="modal-body">
      <div class="form-group">
        <label class="form-label" for="attribute-type">Type</label>
        <select id="attribute-type" class="form-select">
          <option value="title">Title</option>
          <option value="role">Role</option>
          <option value="employment">Employment</option>
          <option value="education">Education</option>
          <option value="certification">Certification</option>
          <option value="award">Award</option>
          <option value="board_membership">Board membership</option>
          <option value="competition">Competition</option>
          <option value="achievement">Achievement</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="attribute-value">Value *</label>
        <input id="attribute-value" class="form-input" type="text" required />
      </div>
      <div class="form-group">
        <label id="attribute-related-label" class="form-label" for="attribute-related">Organization ID</label>
        <input id="attribute-related" class="form-input" type="text" />
      </div>
      <div class="form-group">
        <label class="form-label" for="attribute-start">Start</label>
        <input id="attribute-start" class="form-input" type="text" placeholder="YYYY or YYYY-MM-DD" />
      </div>
      <div class="form-group">
        <label class="form-label" for="attribute-end">End</label>
        <input id="attribute-end" class="form-input" type="text" placeholder="YYYY or YYYY-MM-DD" />
      </div>
      <div class="form-group">
        <label class="form-check">
          <input id="attribute-current" type="checkbox" />
          <span class="form-check-label">Current</span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label" for="attribute-notes">Notes</label>
        <textarea id="attribute-notes" class="form-input" rows="3"></textarea>
      </div>
    </form>
    <div class="modal-footer">
      <div class="modal-footer-right">
        <button id="attribute-modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="attribute-modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/dom.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/canvas.js"></script>
<script src="/static/js/graph.js"></script>
<script src="/static/js/nodes.js"></script>
<script src="/static/js/links.js"></script>
<script src="/static/js/toolbox.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
