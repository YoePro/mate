<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MATE — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg-panel:  #161b27;
      --bg-raised: #1e2535;
      --bg-input:  #1a2030;
      --border:    #2a3347;
      --border-focus: #3b82f6;
      --text-1:    #f1f5f9;
      --text-2:    #94a3b8;
      --text-3:    #4b5563;
      --accent:    #3b82f6;
      --accent-h:  #2563eb;
      --success:   #10b981;
      --error:     #ef4444;
      --radius:    10px;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 18% 58%, rgba(59, 130, 246, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 82% 18%, rgba(16, 185, 129, 0.05) 0%, transparent 55%);
    }

    /* ---- Card ---- */
    .card {
      width: 400px;
      max-width: calc(100vw - 32px);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    }

    /* ---- Brand ---- */
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-icon {
      display: block;
      width: 56px;
      height: 56px;
      color: var(--accent);
      margin: 0 auto 18px;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.22em;
      color: var(--text-1);
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text-2);
      letter-spacing: 0.06em;
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      background: var(--bg-raised);
      border-radius: var(--radius-sm);
      padding: 3px;
      margin-bottom: 28px;
      gap: 2px;
    }

    .tab {
      flex: 1;
      padding: 9px 12px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      text-align: center;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      user-select: none;
      border: none;
      background: transparent;
    }

    .tab:hover { color: var(--text-1); }

    .tab.active {
      background: var(--bg-panel);
      color: var(--text-1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ---- Form ---- */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 7px;
      letter-spacing: 0.03em;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-1);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    input::placeholder { color: var(--text-3); }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* ---- Message area ---- */
    .message {
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 14px;
      line-height: 1.5;
      /* JS: add class "error" or "success" */
    }
    .message.error   { color: var(--error); }
    .message.success { color: var(--success); }

    /* ---- Submit button ---- */
    .btn-submit {
      width: 100%;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .btn-submit:hover   { background: var(--accent-h); }
    .btn-submit:active  { transform: scale(0.99); }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ---- Footer ---- */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Brand -->
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="3"/>
      <circle cx="4"  cy="6"  r="2"/>
      <circle cx="20" cy="6"  r="2"/>
      <circle cx="4"  cy="18" r="2"/>
      <circle cx="20" cy="18" r="2"/>
      <line x1="6"  y1="7"  x2="10" y2="11"/>
      <line x1="18" y1="7"  x2="14" y2="11"/>
      <line x1="6"  y1="17" x2="10" y2="13"/>
      <line x1="18" y1="17" x2="14" y2="13"/>
    </svg>
    <div class="brand-name">MATE</div>
    <div class="brand-sub">Memories · Alliances · Time · Engagement</div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="signin"  onclick="switchTab('signin')">Sign in</button>
    <button class="tab"        data-tab="signup"  onclick="switchTab('signup')">Create account</button>
  </div>

  <!-- Form -->
  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <!-- Message (show errors / success here) -->
  <div class="message" id="message"></div>

  <!-- Submit -->
  <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">Sign in</button>

  <!-- Footer -->
  <div class="card-footer">
    Secure access to your personal relationship network
  </div>

</div>

<script>
  // ---- Tab switching ----
  let currentTab = 'signin';

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.getElementById('btn-submit').textContent =
      tab === 'signin' ? 'Sign in' : 'Create account';
    setMessage('');
  }

  // ---- Message helper ----
  function setMessage(text, type /* 'error' | 'success' */) {
    const el = document.getElementById('message');
    el.textContent = text || '';
    el.className = 'message' + (type ? ' ' + type : '');
  }

  // ---- Submit handler — wire up your auth logic here ----
  async function handleSubmit() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-submit');

    if (!email || !password) {
      setMessage('Please enter your email and password.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = currentTab === 'signin' ? 'Signing in...' : 'Creating account...';
    setMessage('');

    try {
      // TODO: replace with your auth call, e.g.:
      // const { error } = await supabase.auth.signInWithPassword({ email, password });
      // if (error) throw error;
      // window.location.href = '/';

      // Simulate a short delay for the demo
      await new Promise(r => setTimeout(r, 800));
      setMessage('Success! (replace this with real logic)', 'success');
    } catch (err) {
      setMessage(err.message || 'Authentication failed.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === 'signin' ? 'Sign in' : 'Create account';
    }
  }

  // Enter key submits
  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  });
</script>

</body>
</html>
